name: Sperant → Supabase ETL

on:
  # Run daily at 6:00 AM Lima time (UTC-5 → 11:00 UTC)
  schedule:
    - cron: "0 11 * * *"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      lookback_months:
        description: "Months to reprocess (default 3)"
        required: false
        default: "3"

jobs:
  etl:
    name: Extract Sperant → Load Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: etl/requirements.txt

      - name: Install dependencies
        run: pip install -r etl/requirements.txt

      - name: Run ETL
        env:
          # Sperant Redshift — stored as GitHub Actions secrets
          REDSHIFT_HOST:     ${{ secrets.REDSHIFT_HOST }}
          REDSHIFT_PORT:     ${{ secrets.REDSHIFT_PORT }}
          REDSHIFT_DB:       ${{ secrets.REDSHIFT_DB }}
          REDSHIFT_USER:     ${{ secrets.REDSHIFT_USER }}
          REDSHIFT_PASSWORD: ${{ secrets.REDSHIFT_PASSWORD }}

          # Supabase — anon key (writes via SECURITY DEFINER RPC + anon RLS policy)
          # NOTE: Supabase is managed by Lovable — service_role key is not exposed.
          # sperant_leads → upsert_sperant_leads() SECURITY DEFINER function
          # sperant_kpis  → direct REST with anon write RLS policy
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:               ${{ secrets.SUPABASE_KEY }}

          # Config
          LOOKBACK_MONTHS: ${{ github.event.inputs.lookback_months || '3' }}

        run: python etl/sperant_etl.py

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `ETL failed — ${new Date().toISOString().slice(0,10)}`,
              body:  `The Sperant → Supabase ETL failed.\n\nCheck the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
              labels: ["etl-failure"],
            });
            core.warning(`Issue created: ${issue.data.html_url}`);
